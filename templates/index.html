{% extends "layout.html" %}

{% block content %}

<div class="container">

    <!-- Dashboard Stats -->
    <div class="row mb-4">

        <div class="col-md-4 col-lg-3 mb-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h2>{{ stats.total_files }}</h2>
                    <p class="text-muted mb-0">Total Files</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-3 mb-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h2>{{ stats.downloads }}</h2>
                    <p class="text-muted mb-0">Downloads</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 col-lg-6 mb-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h5>{{ stats.latest_upload }}</h5>
                    <p class="text-muted mb-0">Latest Upload</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Hero -->
    <div class="hero">

        <h1>
            QR Based File Sharing
        </h1>

        <p>
            Upload a file and instantly share it across devices using a QR Code.
        </p>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <input type="file" name="file" required>

            <button type="submit">
                Upload File
            </button>

        </form>

    </div>

</div>

{% endblock %}
