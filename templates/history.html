{% extends "layout.html" %}

{% block content %}

<div class="container">

<h2 class="mb-4">Upload History</h2>

<form method="GET" action="/history" class="mb-4">

    <input 
    type="text"
    name="search"
    placeholder="Search file..."
    class="form-control"
    >

    <button class="btn btn-primary mt-2">
        Search
    </button>

    <div class="mt-3">

        <a href="/history?sort=newest" class="btn btn-secondary">
        Newest
        </a>


        <a href="/history?sort=oldest" class="btn btn-secondary">
        Oldest
        </a>


        <a href="/history?sort=downloads" class="btn btn-secondary">
        Most Downloaded
        </a>

    </div>

</form>

<table class="table table-dark table-hover">

<tr>

<th>File</th>

<th>Size</th>

<th>Downloads</th>

<th>Date</th>

<th>Action</th>

</tr>


{% for file in files %}

<tr>

<td>{{ file.filename }}</td>

<td>{{ file.file_size }}</td>

<td>{{ file.download_count }}</td>

<td>{{ file.upload_time }}</td>

<td>

<a 
href="/delete/{{ file.unique_code }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this file?')">

Delete

</a>

</td>

</tr>

{% endfor %}


</table>

</div>

{% endblock %}
