<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        QuickShare
        {% endblock %}
    </title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">

</head>

<body>
    <nav class="navbar navbar-expand-lg quick-navbar">

        <div class="container">

            <a class="navbar-brand quick-logo" href="/">
                <span class="logo-icon">
                    <i class="bi bi-lightning-charge-fill"></i>
                </span>

                QuickShare
            </a>


            <button class="navbar-toggler border-0 shadow-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

                <i class="bi bi-list text-white fs-3"></i>

            </button>
            
            <div class="collapse navbar-collapse" id="navbarMenu">

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">

                        <a class="nav-link quick-link" href="/">
                            Home
                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link quick-link" href="/history">
                            History
                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link quick-link" href="/about">
                            About
                        </a>

                    </li>


                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">

                        <a href="/" class="btn quick-btn">

                            <i class="bi bi-cloud-arrow-up-fill me-2"></i>

                            Upload

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <main class="main-content">

        {% block content %}
        {% endblock %}

    </main>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> 

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    {% block scripts %}
    {% endblock %}

</body>

</html>
